name: Playwright Tests + Jira Update

on:
  push:
    branches:
      - "agent/**"
  workflow_dispatch:          # also allows the agent to trigger manually

permissions:
  contents: read
  actions:  read

jobs:
  # ── 1. Install deps & run Playwright ───────────────────────────────────────
  playwright:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Seed SQLite database
        run: npm run db:init

      - name: Start mock login server (background)
        run: |
          npx ts-node scripts/mockServer.ts &
          echo "SERVER_PID=$!" >> $GITHUB_ENV
          # Wait for server to be ready
          for i in $(seq 1 10); do
            curl -sf http://127.0.0.1:3000/health && break
            sleep 2
          done

      - name: Run Playwright tests
        run: npx playwright test
        env:
          BASE_URL: http://127.0.0.1:3000

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Kill mock server
        if: always()
        run: kill $SERVER_PID || true

  # ── 2. Post results back to Jira ───────────────────────────────────────────
  jira-update:
    name: Post Results to Jira
    runs-on: ubuntu-latest
    needs: playwright
    if: always()             # run even when tests fail

    steps:
      - name: Determine test outcome
        id: outcome
        run: |
          if [ "${{ needs.playwright.result }}" == "success" ]; then
            echo "status=PASSED ✅" >> $GITHUB_OUTPUT
            echo "icon=✅"          >> $GITHUB_OUTPUT
          else
            echo "status=FAILED ❌" >> $GITHUB_OUTPUT
            echo "icon=❌"          >> $GITHUB_OUTPUT
          fi

      - name: Post comment to Jira
        env:
          JIRA_HOST:      ${{ secrets.JIRA_HOST }}
          JIRA_EMAIL:     ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_ISSUE_KEY: ${{ secrets.JIRA_ISSUE_KEY }}
          RESULT:         ${{ steps.outcome.outputs.status }}
          RUN_URL:        https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          WORKFLOW:       ${{ github.workflow }}
          BRANCH:         ${{ github.ref_name }}
        run: |
          python3 << 'PYTHON'
          import urllib.request, json, os, base64
          host     = os.environ['JIRA_HOST']
          email    = os.environ['JIRA_EMAIL']
          token    = os.environ['JIRA_API_TOKEN']
          key      = os.environ['JIRA_ISSUE_KEY']
          result   = os.environ['RESULT']
          run_url  = os.environ['RUN_URL']
          workflow = os.environ['WORKFLOW']
          branch   = os.environ['BRANCH']
          auth = base64.b64encode(f'{email}:{token}'.encode()).decode()
          msg = f'GitHub Actions CI/CD Report\n\nWorkflow: {workflow}\nBranch: {branch}\nRun: {run_url}\nResult: {result}\n\nAutomatically posted by the Agentic AI Pipeline.'
          body = {'body': {'type': 'doc', 'version': 1, 'content': [{'type': 'paragraph', 'content': [{'type': 'text', 'text': msg}]}]}}
          req = urllib.request.Request(
            f'https://{host}/rest/api/3/issue/{key}/comment',
            data=json.dumps(body).encode(),
            headers={'Authorization': f'Basic {auth}', 'Content-Type': 'application/json', 'Accept': 'application/json'},
            method='POST'
          )
          with urllib.request.urlopen(req) as r:
            print('Jira comment posted, status:', r.status)
          PYTHON

      - name: Transition Jira issue to Done (on success)
        if: needs.playwright.result == 'success'
        env:
          JIRA_HOST:      ${{ secrets.JIRA_HOST }}
          JIRA_EMAIL:     ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_ISSUE_KEY: ${{ secrets.JIRA_ISSUE_KEY }}
        run: |
          AUTH=$(echo -n "${JIRA_EMAIL}:${JIRA_API_TOKEN}" | base64)

          # Fetch available transitions
          TRANSITIONS=$(curl -s \
            "https://${JIRA_HOST}/rest/api/3/issue/${JIRA_ISSUE_KEY}/transitions" \
            -H "Authorization: Basic ${AUTH}" \
            -H "Accept: application/json")

          # Find the "Done" transition ID
          TRANSITION_ID=$(echo "$TRANSITIONS" | \
            python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for t in data.get('transitions', []):
              if t['name'].lower() == 'done':
                  print(t['id'])
                  break
          ")

          if [ -n "$TRANSITION_ID" ]; then
            curl -s -X POST \
              "https://${JIRA_HOST}/rest/api/3/issue/${JIRA_ISSUE_KEY}/transitions" \
              -H "Authorization: Basic ${AUTH}" \
              -H "Content-Type: application/json" \
              -d "{\"transition\":{\"id\":\"${TRANSITION_ID}\"}}"
            echo "Transitioned ${JIRA_ISSUE_KEY} → Done"
          else
            echo "No 'Done' transition found — skipping"
          fi
