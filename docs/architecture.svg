<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 920" width="780" height="920">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L9 5L2 9" fill="none" stroke="#64748b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-skip" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L9 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="780" height="920" fill="#f8fafc" rx="12"/>

  <!-- START pill -->
  <rect x="280" y="22" width="220" height="44" rx="22" fill="#534AB7" stroke="#3C3489" stroke-width="1"/>
  <text x="390" y="49" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#fff">npm run agent</text>

  <line x1="390" y1="66" x2="390" y2="90" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Interactive Prompt -->
  <rect x="230" y="90" width="320" height="54" rx="8" fill="#EDE9FF" stroke="#534AB7" stroke-width="1"/>
  <text x="390" y="113" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#3C3489">Interactive Prompt</text>
  <text x="390" y="131" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#534AB7">Collect Jira keys + plain-English test cases</text>

  <line x1="390" y1="144" x2="390" y2="168" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Decision diamond -->
  <polygon points="390,168 478,208 390,248 302,208" fill="#e2e8f0" stroke="#64748b" stroke-width="1.5"/>
  <text x="390" y="203" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#1e293b">Valid</text>
  <text x="390" y="219" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#1e293b">Jira key?</text>

  <!-- Yes arrow down -->
  <text x="398" y="267" font-family="system-ui,sans-serif" font-size="11" fill="#16a34a" font-weight="600">Yes</text>
  <line x1="390" y1="248" x2="390" y2="278" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- No arrow right -->
  <text x="482" y="204" font-family="system-ui,sans-serif" font-size="11" fill="#dc2626" font-weight="600">No</text>
  <line x1="478" y1="208" x2="560" y2="208" stroke="#888780" stroke-width="1.5" marker-end="url(#arr-skip)"/>

  <!-- Skip box -->
  <rect x="560" y="184" width="175" height="48" rx="8" fill="#f1f0ee" stroke="#888780" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="648" y="205" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#5F5E5A">Skipped test</text>
  <text x="648" y="221" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#888780">Placeholder committed to CI</text>

  <!-- Skip rejoins at generator -->
  <line x1="648" y1="232" x2="648" y2="318" stroke="#888780" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="648" y1="318" x2="552" y2="318" stroke="#888780" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arr-skip)"/>

  <!-- Jira Client -->
  <rect x="230" y="278" width="320" height="54" rx="8" fill="#d1fae5" stroke="#0F6E56" stroke-width="1"/>
  <text x="390" y="301" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#085041">Jira Client</text>
  <text x="390" y="319" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#0F6E56">Fetch story via Atlassian REST API v3</text>

  <line x1="390" y1="332" x2="390" y2="356" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- SQLite DB -->
  <ellipse cx="390" cy="356" rx="116" ry="11" fill="#cbd5e1" stroke="#444441" stroke-width="1"/>
  <rect x="274" y="356" width="232" height="50" rx="0" fill="#e2e8f0" stroke="#444441" stroke-width="1"/>
  <ellipse cx="390" cy="406" rx="116" ry="11" fill="#e2e8f0" stroke="#444441" stroke-width="1"/>
  <text x="390" y="378" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#2c2c2a">SQLite DB  (data/users.db)</text>
  <text x="390" y="396" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#444441">10 users · 6 US_PERSON · 4 NON_US_PERSON</text>

  <line x1="390" y1="417" x2="390" y2="440" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Test Generator -->
  <rect x="196" y="440" width="388" height="64" rx="8" fill="#fef3c7" stroke="#BA7517" stroke-width="1"/>
  <text x="390" y="463" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#633806">Test Generator + Claude (claude-sonnet-4-6)</text>
  <text x="390" y="480" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#854F0B">Fixed scaffold · Claude writes assertion bodies only</text>
  <text x="390" y="496" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#854F0B">1 plain-English test case = 1 test() block · No extras</text>

  <line x1="390" y1="504" x2="390" y2="528" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- GitHub container -->
  <rect x="96" y="518" width="588" height="102" rx="8" fill="#eff6ff" stroke="#378ADD" stroke-width="1" stroke-dasharray="5 3"/>
  <text x="390" y="537" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#185FA5" font-weight="600">GitHub Repository</text>
  <!-- main branch -->
  <rect x="110" y="544" width="252" height="64" rx="6" fill="#dbeafe" stroke="#378ADD" stroke-width="1"/>
  <text x="236" y="568" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#0C447C">main branch</text>
  <text x="236" y="585" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#185FA5">ci.yml · src/ · scripts/</text>
  <text x="236" y="600" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#185FA5">Written by: developer</text>
  <!-- agent branch -->
  <rect x="418" y="544" width="252" height="64" rx="6" fill="#dbeafe" stroke="#378ADD" stroke-width="1"/>
  <text x="544" y="568" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#0C447C">agent/auto-tests branch</text>
  <text x="544" y="585" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#185FA5">tests/generated/*.spec.ts</text>
  <text x="544" y="600" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#185FA5">Written by: agent (each run)</text>

  <!-- arrows from both branches converge to CI -->
  <line x1="236" y1="620" x2="236" y2="648" stroke="#64748b" stroke-width="1.5"/>
  <line x1="544" y1="620" x2="544" y2="648" stroke="#64748b" stroke-width="1.5"/>
  <line x1="236" y1="648" x2="544" y2="648" stroke="#64748b" stroke-width="1.5"/>
  <line x1="390" y1="648" x2="390" y2="662" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- GitHub Actions CI -->
  <rect x="176" y="662" width="428" height="72" rx="8" fill="#dbeafe" stroke="#185FA5" stroke-width="1.5"/>
  <text x="390" y="684" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#042C53">GitHub Actions CI</text>
  <text x="390" y="701" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#185FA5">Checkout main · Overlay tests/ from agent branch</text>
  <text x="390" y="718" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#185FA5">npm install · Seed DB · Mock server · Playwright test</text>

  <!-- CI splits: left to reports, right to Jira -->
  <line x1="280" y1="734" x2="196" y2="734" stroke="#64748b" stroke-width="1.5"/>
  <line x1="196" y1="734" x2="196" y2="752" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <line x1="500" y1="734" x2="584" y2="734" stroke="#64748b" stroke-width="1.5"/>
  <line x1="584" y1="734" x2="584" y2="752" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Test Dashboard -->
  <rect x="56" y="752" width="278" height="52" rx="8" fill="#d1fae5" stroke="#0F6E56" stroke-width="1"/>
  <text x="195" y="774" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#085041">Test Dashboard</text>
  <text x="195" y="791" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#0F6E56">Pass/fail · Durations · Pass rate · GitHub link</text>

  <!-- Login Demo UI -->
  <rect x="56" y="820" width="278" height="52" rx="8" fill="#d1fae5" stroke="#0F6E56" stroke-width="1"/>
  <text x="195" y="842" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#085041">Login Demo UI</text>
  <text x="195" y="859" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#0F6E56">US Persons ✓ · Non-US Persons ✕</text>

  <!-- arrow dashboard → login ui -->
  <line x1="195" y1="804" x2="195" y2="820" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- arrow login UI → browser -->
  <line x1="195" y1="872" x2="195" y2="890" stroke="#64748b" stroke-width="1.5"/>
  <line x1="195" y1="890" x2="310" y2="890" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Jira Comment -->
  <rect x="446" y="752" width="278" height="64" rx="8" fill="#fde8df" stroke="#993C1D" stroke-width="1"/>
  <text x="585" y="774" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#4A1B0C">Jira Comment + Transition</text>
  <text x="585" y="791" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#993C1D">Story · CI result · Pass rate · Duration</text>
  <text x="585" y="807" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#993C1D">Test results table · Transition → Done</text>

  <!-- New Chrome session pill -->
  <rect x="310" y="872" width="226" height="40" rx="20" fill="#534AB7" stroke="#3C3489" stroke-width="1"/>
  <text x="423" y="897" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#fff">New Chrome session</text>

</svg>
